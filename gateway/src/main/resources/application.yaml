server:
  port: 8090

spring:
  application:
    name: gateway

  security:
    oauth2:
      client:
        registration:
          # "gateway" debe coincidir con el clientId registrado en el auth-server
          gateway:
            client-id: gateway
            client-secret: secret
            authorization-grant-type: authorization_code
            # Spring Security registra este endpoint internamente — no hace falta un controller manual
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile
        provider:
          gateway:
            # Descarga automáticamente los endpoints del auth-server desde /.well-known/oauth-authorization-server
            issuer-uri: http://localhost:9100

  # Gateway configuration
  cloud:
    gateway:
      server.webflux.routes:
        - id: auth-service
          uri: lb://auth-service  # Use load-balanced URI to route to the auth service
          predicates:
            - Path=/security/**  # Route requests starting with security to the auth service
          filters:
            - StripPrefix=1  # Strip /api prefix before forwarding to the auth service
      
        # Product Service Route
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
            - TokenRelay=   # propaga el access_token de la sesión al microservicio
            - name: CircuitBreaker
              args:
                name: productService
                statusCodes: "500,502,503,504"

        - id: items-service
          uri: lb://items-service
          predicates:
            - Path=/api/items/**
          filters:
            - StripPrefix=1
            - TokenRelay=

        - id: users-service
          uri: lb://users-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
            - TokenRelay=
eureka:
  client:
      service-url:
            defaultZone: http://localhost:8761/eureka/  # URL of the Eureka server
      register-with-eureka: true  # Register this service with Eureka
      fetch-registry: true  # Fetch the registry from Eureka to discover other services


# Resilience4j configuration for circuit breakers and time limiters, 
# using the default configuration defined in resilience4j-defaults.yaml,
# which is imported in the application.yaml of each service that wants to use it,
# in this case the items-service.
resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000 # 10 seconds
    instances:
      productService:
        base-config: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 2000 # 2 seconds
    instances:
      productService:
        base-config: default
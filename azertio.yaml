project:
  organization: Curso Spring
  name: Microservices API Tests
  test-suites:
    - name: smoke
      tag-expression: "smoke"

plugins:
  - gherkin
  - org.azertio.plugins:rest-azertio-plugin:1.1.0-SNAPSHOT

configuration:
  core.resourcePath: features
  rest:
    baseURL: http://localhost:8090
  auth:
    tokenUrl: http://localhost:9100/oauth2/token
    clientId: gateway
    clientSecret: secret

profiles:
  gateway:
    rest.baseURL: http://localhost:8090
  products-direct:
    rest.baseURL: http://localhost:8081
  items-direct:
    rest.baseURL: http://localhost:8082

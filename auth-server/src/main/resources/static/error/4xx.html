<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error — Auth Server</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: white; padding: 2rem 3rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); text-align: center; max-width: 420px; }
        h1 { font-size: 3rem; margin: 0; color: #e67e22; }
        h2 { margin: .5rem 0 1rem; color: #333; }
        p  { color: #666; line-height: 1.5; }
        a  { color: #3498db; }
    </style>
</head>
<body>
    <div class="card">
        <h1>4xx</h1>
        <h2>Petición incorrecta</h2>
        <p>La petición no es válida o el recurso solicitado no existe.</p>
        <p>Si has llegado aquí por error, el flujo correcto comienza desde la <strong>aplicación cliente</strong> que te redirige al servidor de autorización.</p>
    </div>
</body>
</html>
